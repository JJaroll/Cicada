name: Release

# Se dispara al hacer push de un tag de versión, ej: v1.0.0
#v.1.0.1
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-14, ubuntu-latest]
        include:
          - os: windows-latest
            platform: windows
          - os: macos-13
            platform: macos
            arch_suffix: Intel
          - os: macos-latest
            platform: macos
            arch_suffix: ARM64
          - os: ubuntu-latest
            platform: linux

    steps:
      # ------------------------------------------------------------------
      # Paso 0: Checkout
      # ------------------------------------------------------------------
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # Paso 1: Instalar Python 3.11 y dependencias
      # ------------------------------------------------------------------
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      # ------------------------------------------------------------------
      # Paso 2: Ejecutar PyInstaller usando Cicada.spec
      # ------------------------------------------------------------------
      - name: Compilar con PyInstaller
        run: pyinstaller Cicada.spec

      # ------------------------------------------------------------------
      # Paso 3 (solo Windows): Inno Setup -> Cicada_Setup_Windows.exe
      # ------------------------------------------------------------------
      - name: "[Windows] Instalar Inno Setup"
        if: matrix.platform == 'windows'
        run: choco install innosetup --no-progress -y

      - name: "[Windows] Compilar instalador con Inno Setup"
        if: matrix.platform == 'windows'
        run: iscc cicada_installer.iss

      - name: "[Windows] Preparar artefacto final"
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          mkdir -p out_release
          cp dist_installer/Cicada_Setup_Windows.exe out_release/

      # ------------------------------------------------------------------
      # Paso 4 (solo macOS): empaquetar Cicada.app -> Cicada_macOS*.dmg
      # ------------------------------------------------------------------
      - name: "[macOS] Instalar create-dmg"
        if: matrix.platform == 'macos'
        run: |
          brew untap aws/tap || true
          export HOMEBREW_NO_REQUIRE_TAP_TRUST=1
          brew install create-dmg

      # ------------------------------------------------------------------
      # Paso 5 (solo Linux): appimagetool -> Cicada_Linux.AppImage
      # ------------------------------------------------------------------
      - name: "[Linux] Descargar appimagetool"
        if: matrix.platform == 'linux'
        run: |
          wget -q -O appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool

      - name: "[Linux] Construir AppDir"
        if: matrix.platform == 'linux'
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/Cicada AppDir/usr/bin/Cicada
          chmod +x AppDir/usr/bin/Cicada
          cp cicada.desktop AppDir/cicada.desktop
          cp static/logos/cicada_logo.png AppDir/cicada_logo.png
          ln -s usr/bin/Cicada AppDir/AppRun

      - name: "[Linux] Empaquetar AppImage"
        if: matrix.platform == 'linux'
        env:
          ARCH: x86_64
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          mkdir -p out_release
          ./appimagetool AppDir out_release/Cicada_Linux.AppImage

      # ------------------------------------------------------------------
      # Paso 6: Subir los artefactos finales al Release de GitHub
      # ------------------------------------------------------------------
      - name: Publicar assets en el Release
        uses: softprops/action-gh-release@v2
        with:
          files: out_release/*
          fail_on_unmatched_files: true
          generate_release_notes: true
